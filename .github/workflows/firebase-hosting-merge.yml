name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build Nuxt
        run: npm run build
      - name: Debug - List build output
        run: |
          echo "=== .output/public/ ==="
          ls -la .output/public/ || echo "NOT FOUND"
          echo "=== .output/public/_nuxt/ ==="
          ls -la .output/public/_nuxt/ | head -20 || echo "NOT FOUND"
          echo "=== firebase.json ==="
          cat firebase.json
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_AZIZIFIRM_B9E16 }}'
          channelId: live
          projectId: azizifirm-b9e16
